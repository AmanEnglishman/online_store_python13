{% extends "base.html" %}

{% block content %}

<h2 style="margin-bottom:30px;">Popular Products</h2>

<div class="products">

{% for product in products %}

<div class="product-card">

<a href="{% url 'product_detail' product.id %}">

{% with image=product.images.first %}
{% if image %}
<img class="product-image" src="{{ image.image.url }}">
{% endif %}
{% endwith %}

</a>

<div class="product-info">

<div class="product-title">
{{ product.name }}
</div>

<div class="price">
$ {{ product.price }}
</div>

</div>

</div>

{% endfor %}

</div>

{% endblock %}
