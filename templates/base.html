<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TechStore</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#f5f5f5;
}

/* HEADER */

header{
background:white;
padding:20px 40px;
display:flex;
justify-content:space-between;
align-items:center;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.logo{
font-size:24px;
font-weight:bold;
color:#2c3e50;
}

nav a{
margin-left:20px;
text-decoration:none;
color:#333;
font-weight:500;
}

/* CONTAINER */

.container{
width:1200px;
margin:auto;
padding-top:40px;
}

/* PRODUCTS */

.products{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}

.product-card{
background:white;
border-radius:10px;
overflow:hidden;
transition:0.2s;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

.product-card:hover{
transform:translateY(-5px);
}

.product-image{
width:100%;
height:220px;
object-fit:cover;
}

.product-info{
padding:15px;
}

.product-title{
font-size:16px;
margin-bottom:10px;
font-weight:bold;
}

.price{
color:#27ae60;
font-size:18px;
font-weight:bold;
}

.footer{
margin-top:60px;
background:#2c3e50;
color:white;
padding:20px;
text-align:center;
}

</style>

</head>

<body>

<header>

<div class="logo">TechStore</div>

<nav>

<a href="/">Home</a>
<a href="{% url 'cart' %}">Cart</a>

{% if user.is_authenticated %}

<span>Hi, {{ user.username }}</span>

<form action="{% url 'logout' %}" method="post" style="display:inline;">
    {% csrf_token %}
    <button type="submit">Logout</button>
</form>

{% else %}

<a href="{% url 'login' %}">Login</a>
<a href="{% url 'register' %}">Register</a>

{% endif %}

</nav>

</header>

<div class="container">

{% block content %}

{% endblock %}

</div>

<div class="footer">
© 2026 TechStore
</div>

</body>
</html>
